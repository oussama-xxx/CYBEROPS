{% extends 'analyzer/base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="text-white">🛡️ SOC Live Cyberthreat Monitoring</h3>
    <span class="badge bg-danger animate-pulse">● LIVE THREAT FEED</span>
</div>

<div class="row">
    <div class="col-12">
        <div class="card p-2" style="background: #111; border: 1px solid #333; border-radius: 12px;">
            <div style="width: 100%; height: 82vh; border-radius: 8px; overflow: hidden;">
                <iframe src="https://threatmap.fortiguard.com/" width="100%" height="100%" frameborder="0"></iframe>
            </div>
        </div>
    </div>
</div>

<style>
    .animate-pulse {
        animation: pulse 2s infinite;
    }
    @keyframes pulse {
        0% { opacity: 0.4; }
        50% { opacity: 1; }
        100% { opacity: 0.4; }
    }
    /* Supprime les barres de défilement sur le tableau de bord pour un effet écran fixe */
    body {
        overflow: hidden;
    }
</style>

{% endblock %}
